const RECORD_PAGE = `<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<title>ضبط صفحه - آزمون عملی</title>
<style>
body{font-family:Tahoma;background:#1a1a2e;color:#fff;padding:20px}
.container{max-width:800px;margin:auto;background:#16213e;padding:20px;border-radius:15px}
button{background:#e94560;color:#fff;border:none;padding:12px 24px;margin:10px;border-radius:8px;cursor:pointer}
button:disabled{background:#555;cursor:not-allowed}
#timer{font-size:48px;margin:20px;color:#e94560;text-align:center;font-weight:bold}
#status{margin:20px;padding:10px;border-radius:8px;background:#0f3460}
.warning{background:#e94560;padding:10px;border-radius:8px;margin:10px 0;text-align:center}
.success{background:#4CAF50;padding:10px;border-radius:8px;margin:10px 0;text-align:center}
.progress-bar{width:0%;height:10px;background:#4CAF50;transition:width 0.3s;border-radius:5px}
.video-preview{width:100%;max-width:400px;margin:10px auto;border-radius:10px;background:#000}
</style>
</head>
<body>
<div class="container">
<h2>🎥 ضبط صفحه + صدا + وب‌کم</h2>
<div id="info"></div>
<div class="warning">
⚠️ ابتدا به همه درخواست‌های دسترسی اجازه دهید<br>
🎤 میکروفون | 📹 وب‌کم | 🖥️ صفحه نمایش
</div>

<div id="permissionStatus"></div>

<div id="previewArea" style="display:none;">
    <h4>📹 پیش‌نمایش وب‌کم:</h4>
    <video id="webcamPreview" class="video-preview" autoplay muted playsinline></video>
</div>

<div id="timer">۰۰:۰۰</div>
<div id="status">✅ مرحله 1: ابتدا دسترسی‌ها را فعال کنید</div>
<div class="progress-bar" id="progress-bar"></div>

<button id="permBtn" onclick="requestPermissions()">🎤📹 درخواست دسترسی به میکروفون و وب‌کم</button>
<button id="startBtn" onclick="startRecording()" style="display:none;">🎬 شروع ضبط صفحه</button>
<button id="stopBtn" onclick="stopRecording()" style="display:none;">⏹️ پایان و ارسال</button>
</div>

<script>
let mediaRecorder, chunks = [], seconds = 0, timerInterval;
let screenStream = null;
let webcamStream = null;
let micStream = null;
let combinedStream = null;

const WORKER_URL = window.location.origin;
const params = new URLSearchParams(window.location.search);
const examId = params.get('exam_id');
const userId = params.get('user_id');
const studentName = decodeURIComponent(params.get('name') || 'کاربر');
const token = params.get('token');
const ts = params.get('ts');

document.getElementById('info').innerHTML = '<h3>👤 ' + studentName + '</h3><p>📚 آزمون ' + examId + '</p>';

// ========== مرحله 1: دریافت دسترسی به میکروفون و وب‌کم ==========
async function requestPermissions() {
    try {
        document.getElementById('permissionStatus').innerHTML = '<div class="warning">⏳ درخواست دسترسی به میکروفون و وب‌کم...</div>';
        
        // دریافت دسترسی به میکروفون و وب‌کم
        webcamStream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 320 }, height: { ideal: 240 }, facingMode: "user" },
            audio: true
        });
        
        // نمایش پیش‌نمایش وب‌کم
        const preview = document.getElementById('webcamPreview');
        preview.srcObject = webcamStream;
        document.getElementById('previewArea').style.display = 'block';
        
        document.getElementById('permissionStatus').innerHTML = '<div class="success">✅ دسترسی به میکروفون و وب‌کم داده شد!</div>';
        document.getElementById('status').innerHTML = '✅ مرحله 2: حالا دکمه "شروع ضبط" را بزنید';
        document.getElementById('permBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'inline-block';
        
    } catch(err) {
        document.getElementById('permissionStatus').innerHTML = '<div class="warning">❌ خطا: ' + err.message + '<br>لطفاً دسترسی‌ها را در مرورگر فعال کنید.</div>';
    }
}

// ========== مرحله 2: شروع ضبط صفحه + ترکیب با صدا و وب‌کم ==========
async function startRecording() {
    try {
        document.getElementById('status').innerHTML = '⏳ درخواست دسترسی به صفحه نمایش...';
        
        // دریافت دسترسی به صفحه نمایش (با صدا)
        screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: { width: { ideal: 854 }, height: { ideal: 480 }, frameRate: { ideal: 15 } },
            audio: true
        });
        
        // ترکیب همه استریم‌ها: صفحه + وب‌کم + میکروفون
        const tracks = [];
        
        // اضافه کردن ویدیوی صفحه
        tracks.push(...screenStream.getVideoTracks());
        
        // اضافه کردن ویدیوی وب‌کم (اختیاری، می‌توانید حذف کنید)
        if (webcamStream) {
            tracks.push(...webcamStream.getVideoTracks());
        }
        
        // اضافه کردن صدای میکروفون (از وب‌کم استریم می‌آید)
        if (webcamStream) {
            tracks.push(...webcamStream.getAudioTracks());
        }
        
        // اگر صفحه صدای جداگانه داشت (مثل فیلم در حال پخش)
        tracks.push(...screenStream.getAudioTracks());
        
        combinedStream = new MediaStream(tracks);
        
        mediaRecorder = new MediaRecorder(combinedStream, { 
            mimeType: 'video/webm',
            videoBitsPerSecond: 800000  // 800 kbps
        });
        chunks = [];
        
        mediaRecorder.ondataavailable = (e) => { if(e.data.size) chunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            if (blob.size > 20 * 1024 * 1024) {
                document.getElementById('status').innerHTML = '❌ حجم فیلم از 20 مگابایت بیشتر است! لطفاً کمتر از 5 دقیقه ضبط کنید.';
                return;
            }
            uploadVideo(blob);
            stopAllStreams();
        };
        
        mediaRecorder.start(1000);
        startTimer();
        
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        document.getElementById('status').innerHTML = '🔴 در حال ضبط صفحه + صدا + وب‌کم... (حداکثر ۵ دقیقه)';
        
        // توقف خودکار بعد از 5 دقیقه
        setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                stopRecording();
            }
        }, 300000);
        
        // اگر کاربر پنجره اشتراک‌گذاری را ببندد
        screenStream.getVideoTracks()[0].onended = () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                stopRecording();
            }
        };
        
    } catch(err) {
        document.getElementById('status').innerHTML = '❌ خطا: ' + err.message;
    }
}

function startTimer() {
    seconds = 0;
    timerInterval = setInterval(() => {
        seconds++;
        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        document.getElementById('timer').innerText = mins.toString().padStart(2,'0') + ':' + secs.toString().padStart(2,'0');
        if (seconds >= 300) {
            document.getElementById('timer').style.color = '#e94560';
        }
    }, 1000);
}

function stopRecording() {
    if(mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        clearInterval(timerInterval);
        document.getElementById('status').innerHTML = '⏳ در حال ارسال فیلم...';
    }
}

function stopAllStreams() {
    if (screenStream) screenStream.getTracks().forEach(t => t.stop());
    if (webcamStream) webcamStream.getTracks().forEach(t => t.stop());
    if (combinedStream) combinedStream.getTracks().forEach(t => t.stop());
}

async function uploadVideo(blob) {
    const formData = new FormData();
    formData.append('video', blob, 'recording.webm');
    formData.append('exam_id', examId);
    formData.append('user_id', userId);
    formData.append('student_name', studentName);
    formData.append('token', token);
    formData.append('ts', ts);
    
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e) => {
        if(e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }
    };
    xhr.onload = () => {
        if(xhr.status === 200) {
            document.getElementById('status').innerHTML = '✅ فیلم با موفقیت ارسال شد! صفحه را ببندید.';
            document.getElementById('stopBtn').style.display = 'none';
        } else {
            try {
                const resp = JSON.parse(xhr.responseText);
                document.getElementById('status').innerHTML = '❌ خطا: ' + (resp.error || 'مشکل در ارسال');
            } catch(e) {
                document.getElementById('status').innerHTML = '❌ خطا در ارسال فیلم';
            }
        }
    };
    xhr.onerror = () => {
        document.getElementById('status').innerHTML = '❌ خطای شبکه';
    };
    xhr.open('POST', WORKER_URL + '/upload');
    xhr.send(formData);
}
</script>
</body>
</html>`;
