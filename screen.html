<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<title>ضبط صفحه - آزمون عملی</title>
<style>
body{font-family:Tahoma;background:#1a1a2e;color:#fff;padding:20px}
.container{max-width:800px;margin:auto;background:#16213e;padding:20px;border-radius:15px}
button{background:#e94560;color:#fff;border:none;padding:12px 24px;margin:10px;border-radius:8px;cursor:pointer}
#timer{font-size:48px;margin:20px;color:#e94560;text-align:center}
.workshop-card{background:#0f3460;margin:15px 0;padding:15px;border-radius:10px}
.question{margin:10px 0;padding:10px;background:#1a1a2e;border-radius:8px}
textarea{width:100%;padding:8px;border-radius:5px}
</style>
</head>
<body>
<div class="container">
<h2>🎥 آزمون عملی</h2>
<div id="info"></div>
<div id="workshops-area"></div>
<div id="timer">۰۰:۰۰</div>
<div id="status">✅ آماده شروع</div>
<button id="startBtn" onclick="startRecording()">🎬 شروع ضبط</button>
<button id="stopBtn" onclick="stopRecording()" style="display:none;">⏹️ پایان</button>
</div>

<script>
const WORKER_URL = "https://exam-worker.mosk62013.workers.dev";
const params = new URLSearchParams(window.location.search);
const examId = params.get('exam_id');
const userId = params.get('user_id');
const studentName = decodeURIComponent(params.get('name') || 'کاربر');
const token = params.get('token');
const ts = params.get('ts');

document.getElementById('info').innerHTML = '<h3>👤 ' + studentName + '</h3><p>📚 آزمون ' + examId + '</p>';

let mediaRecorder, chunks = [], seconds = 0, timerInterval;
let workshops = [];

// دریافت کارگاه‌ها از سرور
async function loadWorkshops() {
    const response = await fetch(`${WORKER_URL}/api/random-workshops`);
    workshops = await response.json();
    
    let html = '';
    for (let i = 0; i < workshops.length; i++) {
        const w = workshops[i];
        const questions = JSON.parse(w.questions_json);
        html += `
            <div class="workshop-card">
                <h3>📚 ${w.title}</h3>
                ${questions.map((q, idx) => `
                    <div class="question">
                        <p><strong>سوال ${idx+1}:</strong> ${q}</p>
                        <textarea id="ans_${w.id}_${idx}" placeholder="پاسخ خود را بنویسید..."></textarea>
                    </div>
                `).join('')}
            </div>
        `;
    }
    document.getElementById('workshops-area').innerHTML = html;
}

async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
            video: { width: 854, height: 480, frameRate: 15 },
            audio: true
        });
        
        mediaRecorder = new MediaRecorder(stream, { videoBitsPerSecond: 500000 });
        chunks = [];
        mediaRecorder.ondataavailable = (e) => { if(e.data.size) chunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            uploadVideo(blob);
            stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start(1000);
        startTimer();
        
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        document.getElementById('status').innerHTML = '🔴 در حال ضبط...';
        
        setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
        }, 300000);
        
    } catch(err) {
        document.getElementById('status').innerHTML = '❌ خطا: ' + err.message;
    }
}

function startTimer() {
    seconds = 0;
    timerInterval = setInterval(() => {
        seconds++;
        let mins = Math.floor(seconds/60);
        let secs = seconds%60;
        document.getElementById('timer').innerText = mins.toString().padStart(2,'0') + ':' + secs.toString().padStart(2,'0');
    }, 1000);
}

function stopRecording() {
    if(mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        clearInterval(timerInterval);
        document.getElementById('status').innerHTML = '⏳ در حال ارسال...';
    }
}

async function uploadVideo(blob) {
    // جمع‌آوری پاسخ‌ها
    const answers = {};
    for (const w of workshops) {
        const questions = JSON.parse(w.questions_json);
        for (let i = 0; i < questions.length; i++) {
            const ans = document.getElementById(`ans_${w.id}_${i}`)?.value || '';
            answers[`${w.id}_q${i+1}`] = ans;
        }
    }
    
    const formData = new FormData();
    formData.append('video', blob);
    formData.append('exam_id', examId);
    formData.append('user_id', userId);
    formData.append('student_name', studentName);
    formData.append('token', token);
    formData.append('ts', ts);
    formData.append('answers', JSON.stringify(answers));
    
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e) => {
        if(e.lengthComputable) {
            document.getElementById('progress-bar').style.width = (e.loaded/e.total)*100 + '%';
        }
    };
    xhr.onload = () => {
        if(xhr.status === 200) {
            document.getElementById('status').innerHTML = '✅ فیلم ارسال شد!';
        } else {
            document.getElementById('status').innerHTML = '❌ خطا در ارسال';
        }
    };
    xhr.open('POST', WORKER_URL + '/upload');
    xhr.send(formData);
}

loadWorkshops();
</script>
</body>
</html>
