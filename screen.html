<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>آزمون عملی - ضبط صفحه</title>
    <style>
        body {
            font-family: Tahoma;
            background: #1a1a2e;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
        }
        .workshop-card {
            background: #0f3460;
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
        }
        .question {
            margin: 10px 0;
            padding: 10px;
            background: #1a1a2e;
            border-radius: 8px;
        }
        textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            margin-top: 5px;
            font-family: Tahoma;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .success-btn { background: #4CAF50; }
        .danger-btn { background: #e94560; }
        .info-btn { background: #2196F3; }
        .timer {
            font-size: 48px;
            text-align: center;
            margin: 20px;
            font-weight: bold;
            color: #e94560;
        }
        .progress {
            width: 0%;
            height: 10px;
            background: #4CAF50;
            transition: width 0.3s;
            border-radius: 5px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            text-align: center;
        }
        .step { background: #2196F3; }
        .success { background: #4CAF50; }
        .warning { background: #e94560; }
        .webcam-preview {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 10px;
            border: 3px solid #e94560;
            z-index: 9999;
            background: black;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🎥 آزمون عملی</h2>
    <div id="studentInfo"></div>
    
    <!-- نمایش کارگاه فعلی -->
    <div id="workshopContainer"></div>
    
    <!-- بخش ضبط -->
    <div id="recordingSection" style="display:none;">
        <div class="timer" id="timer">۰۰:۰۰</div>
        <div class="progress" id="progressBar"></div>
        <div class="status" id="recordingStatus">🔴 در حال ضبط...</div>
        <button id="stopRecordBtn" class="danger-btn">⏹️ پایان ضبط و ارسال</button>
    </div>
    
    <!-- بخش بعد از اتمام -->
    <div id="nextSection" style="display:none; text-align:center;">
        <div class="status success">✅ ارسال شد!</div>
        <button id="nextWorkshopBtn" class="success-btn">➡️ کارگاه بعدی</button>
    </div>
    
    <div id="completeSection" style="display:none; text-align:center;">
        <div class="status success">🎉 تمام کارگاه‌ها با موفقیت ارسال شد! از همراهی شما متشکریم.</div>
    </div>
</div>

<script>
// ========== تنظیمات ==========
const WORKER_URL = "https://exam-worker.mosk62013.workers.dev";  // آدرس Worker خود را اینجا وارد کنید
const params = new URLSearchParams(window.location.search);
const examId = params.get('exam_id');
const userId = params.get('user_id');
const studentName = decodeURIComponent(params.get('name') || 'کاربر');
const token = params.get('token');
const ts = params.get('ts');

document.getElementById('studentInfo').innerHTML = `<h3>👤 ${studentName}</h3><p>📚 آزمون ${examId}</p>`;

// ========== متغیرها ==========
let workshops = [];           // لیست کارگاه‌های این دانشجو
let currentIndex = 0;        // کارگاه جاری (0, 1, 2)
let currentWorkshop = null;   // کارگاه فعلی
let currentAnswers = {};      // پاسخ‌های سوالات کارگاه فعلی

// متغیرهای ضبط
let mediaRecorder = null;
let recordedChunks = [];
let seconds = 0;
let timerInterval = null;
let screenStream = null;
let micStream = null;
let webcamElement = null;

// ========== دریافت کارگاه‌ها از Worker ==========
async function loadWorkshops() {
    document.getElementById('workshopContainer').innerHTML = '<div class="status step">⏳ در حال بارگیری کارگاه‌ها...</div>';
    
    try {
        const response = await fetch(`${WORKER_URL}/api/random-workshops`);
        if (!response.ok) throw new Error('خطا در دریافت کارگاه‌ها');
        workshops = await response.json();
        console.log("کارگاه‌های دریافت شده:", workshops);
        
        if (!workshops || workshops.length === 0) {
            throw new Error('هیچ کارگاهی یافت نشد');
        }
        
        // نمایش اولین کارگاه
        showCurrentWorkshop();
    } catch(err) {
        document.getElementById('workshopContainer').innerHTML = `<div class="status warning">❌ خطا: ${err.message}</div>`;
    }
}

// ========== نمایش کارگاه فعلی با سوالات ==========
function showCurrentWorkshop() {
    if (currentIndex >= workshops.length) {
        // تمام کارگاه‌ها تمام شد
        document.getElementById('workshopContainer').style.display = 'none';
        document.getElementById('completeSection').style.display = 'block';
        return;
    }
    
    currentWorkshop = workshops[currentIndex];
    console.log("نمایش کارگاه:", currentWorkshop);
    
    let questions = [];
    try {
        if (typeof currentWorkshop.questions_json === 'string') {
            questions = JSON.parse(currentWorkshop.questions_json);
        } else if (currentWorkshop.questions_json) {
            questions = currentWorkshop.questions_json;
        } else {
            questions = [];
        }
    } catch(e) {
        console.error("خطا در parse سوالات:", e);
        questions = [];
    }
    
    let html = `
        <div class="workshop-card">
            <h3>📚 کارگاه ${currentIndex + 1} از ${workshops.length}: ${currentWorkshop.title}</h3>
            <p><strong>رنج ${currentWorkshop.range_type}</strong></p>
    `;
    
    if (questions.length === 0) {
        html += `<p class="status warning">⚠️ سوالات این کارگاه یافت نشد</p>`;
    } else {
        for (let i = 0; i < questions.length; i++) {
            html += `
                <div class="question">
                    <p><strong>سوال ${i+1}:</strong> ${questions[i]}</p>
                    <textarea id="ans_${i}" rows="3" placeholder="پاسخ خود را بنویسید..." style="width:100%;"></textarea>
                </div>
            `;
        }
    }
    
    html += `
            <button id="startRecordBtn" class="info-btn">🎬 شروع ضبط برای این کارگاه</button>
        </div>
    `;
    
    document.getElementById('workshopContainer').innerHTML = html;
    document.getElementById('recordingSection').style.display = 'none';
    document.getElementById('nextSection').style.display = 'none';
    
    // اتصال دکمه شروع ضبط
    document.getElementById('startRecordBtn').onclick = startRecordingProcess;
}

// ========== گرفتن دسترسی و شروع ضبط ==========
async function startRecordingProcess() {
    // جمع‌آوری پاسخ‌های سوالات
    const questions = JSON.parse(currentWorkshop.questions_json || '[]');
    for (let i = 0; i < questions.length; i++) {
        const textarea = document.getElementById(`ans_${i}`);
        if (textarea) {
            currentAnswers[`q${i+1}`] = textarea.value;
        }
    }
    
    try {
        // گرفتن دسترسی وبکم و میکروفون
        micStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        
        // نمایش وبکم شناور
        if (webcamElement) webcamElement.remove();
        webcamElement = document.createElement('video');
        webcamElement.srcObject = micStream;
        webcamElement.autoplay = true;
        webcamElement.muted = true;
        webcamElement.className = 'webcam-preview';
        document.body.appendChild(webcamElement);
        
        // شروع ضبط صفحه
        await startScreenRecording();
        
    } catch(err) {
        alert('خطا در دسترسی به وبکم: ' + err.message);
    }
}

async function startScreenRecording() {
    try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: { width: 960, height: 540, frameRate: { ideal: 12 } },
            audio: true
        });
        
        // ترکیب ویدیوی صفحه و صدای میکروفون
        const tracks = [...screenStream.getVideoTracks()];
        if (micStream && micStream.getAudioTracks().length > 0) {
            tracks.push(...micStream.getAudioTracks());
        }
        const finalStream = new MediaStream(tracks);
        
        mediaRecorder = new MediaRecorder(finalStream, { videoBitsPerSecond: 500000 });
        recordedChunks = [];
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            uploadVideo(blob);
            if (screenStream) screenStream.getTracks().forEach(t => t.stop());
        };
        
        mediaRecorder.start(1000);
        
        // تایمر 5 دقیقه‌ای
        seconds = 0;
        timerInterval = setInterval(() => {
            seconds++;
            let mins = Math.floor(seconds / 60);
            let secs = seconds % 60;
            document.getElementById('timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (seconds >= 300) {
                clearInterval(timerInterval);
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }
        }, 1000);
        
        // نمایش بخش ضبط
        document.getElementById('workshopContainer').style.display = 'none';
        document.getElementById('recordingSection').style.display = 'block';
        document.getElementById('recordingStatus').innerHTML = '<div class="status success">🔴 در حال ضبط... (حداکثر ۵ دقیقه)</div>';
        
        // دکمه توقف
        document.getElementById('stopRecordBtn').onclick = () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                document.getElementById('recordingStatus').innerHTML = '<div class="status step">⏳ در حال ارسال...</div>';
            }
        };
        
        // اگر کاربر پنجره اشتراک‌گذاری را ببندد
        if (screenStream.getVideoTracks()[0]) {
            screenStream.getVideoTracks()[0].onended = () => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                    clearInterval(timerInterval);
                }
            };
        }
        
    } catch(err) {
        document.getElementById('recordingStatus').innerHTML = `<div class="status warning">❌ خطا: ${err.message}</div>`;
    }
}

// ========== آپلود ویدیو ==========
async function uploadVideo(blob) {
    const formData = new FormData();
    formData.append('video', blob);
    formData.append('exam_id', examId);
    formData.append('user_id', userId);
    formData.append('student_name', studentName);
    formData.append('token', token);
    formData.append('ts', ts);
    formData.append('workshop_id', currentWorkshop.id);
    formData.append('workshop_title', currentWorkshop.title);
    formData.append('answers', JSON.stringify(currentAnswers));
    formData.append('workshop_index', currentIndex);
    
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
        }
    };
    xhr.onload = () => {
        if (xhr.status === 200) {
            // بستن وبکم
            if (webcamElement) webcamElement.remove();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            micStream = null;
            
            // نمایش بخش بعد
            document.getElementById('recordingSection').style.display = 'none';
            document.getElementById('nextSection').style.display = 'block';
            
            // دکمه کارگاه بعدی
            document.getElementById('nextWorkshopBtn').onclick = () => {
                currentIndex++;
                currentAnswers = {};
                document.getElementById('workshopContainer').style.display = 'block';
                document.getElementById('nextSection').style.display = 'none';
                showCurrentWorkshop();
            };
        } else {
            document.getElementById('recordingStatus').innerHTML = '<div class="status warning">❌ خطا در ارسال</div>';
        }
    };
    xhr.onerror = () => {
        document.getElementById('recordingStatus').innerHTML = '<div class="status warning">❌ خطای شبکه</div>';
    };
    xhr.open('POST', WORKER_URL + '/upload');
    xhr.send(formData);
}

// ========== شروع ==========
loadWorkshops();
</script>
</body>
</html>
