<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>ضبط صفحه - آزمون عملی</title>
    <style>
        body {
            font-family: Tahoma, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        .step-box {
            background: #0f3460;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }
        .success { background: #4CAF50; color: white; }
        .warning { background: #e94560; color: white; }
        .info { background: #2196F3; color: white; }
        #timer {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 20px;
            color: #e94560;
            font-family: monospace;
        }
        .progress-bar {
            width: 0%;
            height: 10px;
            background: #4CAF50;
            transition: width 0.3s;
            border-radius: 5px;
        }
        /* استایل برای پنجره شناور وب کم */
        .floating-webcam {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 10px;
            border: 2px solid #e94560;
            z-index: 10000;
            background: black;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.2s;
        }
        .floating-webcam video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        .floating-webcam.minimized {
            width: 60px;
            height: 45px;
        }
        /* دکمه بستن پنجره شناور */
        .webcam-close {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #e94560;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            text-align: center;
            line-height: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🎥 آزمون عملی</h2>
    <div id="info"></div>

    <div id="step1" class="step-box info">
        <strong>مرحله 1:</strong> ابتدا دکمه زیر را بزنید و به مرورگر اجازه دسترسی به وب کم و میکروفون را بدهید.
    </div>
    <div id="step2" class="step-box info" style="display:none;">
        <strong>مرحله 2:</strong> حالا دکمه "شروع ضبط صفحه" را بزنید و گزینه "اشتراک‌گذاری صدا" را فعال کنید.
    </div>

    <div id="timer" style="display:none;">۰۰:۰۰</div>
    <div id="status"></div>
    <div class="progress-bar" id="progress-bar" style="display:none;"></div>

    <div style="text-align: center;">
        <button id="permBtn" onclick="requestPermissions()">🎤 درخواست دسترسی به وب کم و میکروفون</button>
        <button id="startBtn" onclick="startRecording()" style="display:none;">🎬 شروع ضبط صفحه با صدا</button>
        <button id="stopBtn" onclick="stopRecording()" style="display:none;">⏹️ پایان و ارسال</button>
    </div>
</div>

<script>
    // ========== تنظیمات اولیه ==========
    const WORKER_URL = "https://exam-worker.mosk62013.workers.dev"; // آدرس واقعی Worker خود را اینجا وارد کنید
    const params = new URLSearchParams(window.location.search);
    const examId = params.get('exam_id');
    const userId = params.get('user_id');
    const studentName = decodeURIComponent(params.get('name') || 'کاربر');
    const token = params.get('token');
    const ts = params.get('ts');

    document.getElementById('info').innerHTML = `<h3>👤 ${studentName}</h3><p>📚 آزمون ${examId}</p>`;

    // ========== متغیرهای اصلی ==========
    let screenStream = null;       // استریم صفحه
    let micStream = null;          // استریم میکروفون (از وب کم گرفته می‌شود)
    let mediaRecorder = null;
    let recordedChunks = [];
    let seconds = 0;
    let timerInterval = null;
    let webcamDiv = null;          // عنصر پنجره شناور وب کم

    // ========== مرحله 1: دریافت دسترسی وب کم و میکروفون ==========
    async function requestPermissions() {
        try {
            document.getElementById('status').innerHTML = '<div class="info">⏳ درخواست دسترسی به وب کم و میکروفون...</div>';
            
            // فقط برای گرفتن دسترسی، یک استریم موقت می‌گیریم
            micStream = await navigator.mediaDevices.getUserMedia({ 
                video: true,    // درخواست وب کم
                audio: true     // درخواست میکروفون
            });
            
            // --- ایجاد پنجره شناور برای نمایش وب کم ---
            if (webcamDiv) webcamDiv.remove();
            webcamDiv = document.createElement('div');
            webcamDiv.className = 'floating-webcam';
            
            const videoElem = document.createElement('video');
            videoElem.srcObject = micStream;
            videoElem.autoplay = true;
            videoElem.muted = true;   // برای جلوگیری از بازخورد صدا (از طریق میکروفون ضبط می‌شود)
            webcamDiv.appendChild(videoElem);
            
            // دکمه بستن
            const closeBtn = document.createElement('div');
            closeBtn.innerHTML = '✕';
            closeBtn.className = 'webcam-close';
            closeBtn.onclick = (e) => {
                e.stopPropagation();
                if (webcamDiv) webcamDiv.remove();
                if (micStream) micStream.getTracks().forEach(t => t.stop());
                micStream = null;
                alert('وب کم بسته شد. برای فعال‌سازی مجدد صفحه را refresh کنید.');
            };
            webcamDiv.appendChild(closeBtn);
            
            // کلیک برای بزرگ/کوچک کردن
            webcamDiv.onclick = () => webcamDiv.classList.toggle('minimized');
            
            document.body.appendChild(webcamDiv);
            // --------------------------------
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('status').innerHTML = '<div class="success">✅ دسترسی به وب کم و میکروفون داده شد!</div>';
            document.getElementById('permBtn').style.display = 'none';
            document.getElementById('startBtn').style.display = 'inline-block';
            
        } catch(err) {
            document.getElementById('status').innerHTML = `<div class="warning">❌ خطا در دریافت دسترسی: ${err.message}<br>لطفاً دسترسی‌ها را در مرورگر فعال کنید.</div>`;
        }
    }

    // ========== مرحله 2: شروع ضبط صفحه با صدا ==========
    async function startRecording() {
        if (!micStream) {
            alert('لطفاً ابتدا مرحله 1 (درخواست دسترسی) را انجام دهید.');
            return;
        }

        try {
            document.getElementById('status').innerHTML = '<div class="info">⏳ درخواست دسترسی به صفحه نمایش...</div>';
            
            // دریافت استریم صفحه (با صدا)
            screenStream = await navigator.mediaDevices.getDisplayMedia({
                video: { width: 854, height: 480, frameRate: 15 },
                audio: true   // صدای سیستم (اگر کاربر گزینه Share Audio را فعال کند)
            });
            
            // ------ ترکیب استریم صفحه و میکروفون (برای ضبط صدا) ------
            // این کار برای ضبط صدای میکروفون (وب کم) به همراه ویدیوی صفحه ضروری است
            const tracks = [...screenStream.getVideoTracks()];
            
            // اضافه کردن صدای میکروفون (از استریم وب کم)
            if (micStream && micStream.getAudioTracks().length > 0) {
                tracks.push(...micStream.getAudioTracks());
            }
            // اضافه کردن صدای سیستم (اگر کاربر اجازه داده باشد)
            tracks.push(...screenStream.getAudioTracks());
            
            const combinedStream = new MediaStream(tracks);
            // --------------------------------------------
            
            mediaRecorder = new MediaRecorder(combinedStream, { 
                mimeType: 'video/webm',
                videoBitsPerSecond: 500000 
            });
            recordedChunks = [];
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                if (blob.size > 20 * 1024 * 1024) {
                    document.getElementById('status').innerHTML = '<div class="warning">❌ حجم فیلم بیشتر از 20 مگابایت است! لطفاً کمتر از 5 دقیقه ضبط کنید.</div>';
                    return;
                }
                uploadVideo(blob);
                // بستن استریم‌ها
                if (screenStream) screenStream.getTracks().forEach(t => t.stop());
                // استریم وب کم را نمی‌بندیم تا پنجره شناور کار کند، کاربر خودش می‌تواند ببندد
            };
            
            mediaRecorder.start(1000);
            startTimer();
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('timer').style.display = 'block';
            document.getElementById('progress-bar').style.display = 'block';
            document.getElementById('status').innerHTML = '<div class="success">🔴 در حال ضبط صفحه و صدا... (حداکثر ۵ دقیقه)</div>';
            
            // توقف خودکار بعد از 5 دقیقه
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
            }, 300000);
            
            // اگر کاربر پنجره اشتراک‌گذاری را ببندد
            if (screenStream.getVideoTracks()[0]) {
                screenStream.getVideoTracks()[0].onended = () => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
                };
            }
            
        } catch(err) {
            document.getElementById('status').innerHTML = `<div class="warning">❌ خطا: ${err.message}</div>`;
        }
    }

    function startTimer() {
        seconds = 0;
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            seconds++;
            let mins = Math.floor(seconds / 60);
            let secs = seconds % 60;
            document.getElementById('timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (seconds >= 300) document.getElementById('timer').style.color = '#f00';
        }, 1000);
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            clearInterval(timerInterval);
            document.getElementById('status').innerHTML = '<div class="info">⏳ در حال ارسال فیلم...</div>';
        }
    }

    // ========== آپلود به Worker ==========
    async function uploadVideo(blob) {
        const formData = new FormData();
        formData.append('video', blob, 'recording.webm');
        formData.append('exam_id', examId);
        formData.append('user_id', userId);
        formData.append('student_name', studentName);
        formData.append('token', token);
        formData.append('ts', ts);
        formData.append('answers', JSON.stringify({})); // پاسخ‌ها فعلاً خالی

        const xhr = new XMLHttpRequest();
        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                document.getElementById('progress-bar').style.width = (e.loaded / e.total) * 100 + '%';
            }
        };
        xhr.onload = () => {
            if (xhr.status === 200) {
                document.getElementById('status').innerHTML = '<div class="success">✅ فیلم با موفقیت ارسال شد! صفحه را می‌توانید ببندید.</div>';
                document.getElementById('stopBtn').style.display = 'none';
            } else {
                document.getElementById('status').innerHTML = `<div class="warning">❌ خطا در ارسال: ${xhr.status}</div>`;
            }
        };
        xhr.onerror = () => document.getElementById('status').innerHTML = '<div class="warning">❌ خطای شبکه</div>';
        xhr.open('POST', WORKER_URL + '/upload');
        xhr.send(formData);
    }
</script>
</body>
    </html>
