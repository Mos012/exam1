<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>ضبط صفحه - آزمون عملی</title>
    <style>
        body { font-family: Tahoma; background: #1a1a2e; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #16213e; padding: 20px; border-radius: 15px; }
        button { background: #e94560; color: white; border: none; padding: 12px 24px; margin: 10px; border-radius: 8px; cursor: pointer; }
        #status { margin: 20px; padding: 10px; border-radius: 8px; }
        #timer { font-size: 32px; font-weight: bold; margin: 20px; color: #e94560; text-align: center; }
        .recording { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .progress-bar { width: 0%; height: 10px; background: #4CAF50; transition: width 0.3s; border-radius: 5px; }
        .question-card { background: #0f3460; margin: 15px 0; padding: 15px; border-radius: 10px; }
        textarea { width: 100%; padding: 8px; margin: 5px 0; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎥 ضبط صفحه برای آزمون</h2>
    <div id="info"></div>
    <div id="questions-area"></div>
    <div id="timer">۰۰:۰۰</div>
    <div id="status">✅ آماده شروع</div>
    <div class="progress-bar" id="progress-bar"></div>
    <button id="startBtn" onclick="startExam()">🎬 شروع ضبط</button>
    <button id="stopBtn" onclick="stopRecording()" style="display:none;">⏹️ پایان و ارسال</button>
</div>

<script>
    // ⚠️ این آدرس را بعد از دیپلوی Worker جایگزین کنید
    const WORKER_URL = "https://your-worker.workers.dev";
    
    let mediaRecorder, chunks = [], seconds = 0, timerInterval;
    let uploadUrl, fileKey, examId, studentName, userId;
    let questions = [];
    
    const params = new URLSearchParams(window.location.search);
    examId = params.get('exam_id');
    userId = params.get('user_id');
    studentName = decodeURIComponent(params.get('name') || '');
    const token = params.get('token');
    const ts = params.get('ts');
    
    document.getElementById('info').innerHTML = `<h3>👤 ${studentName}</h3><p>📚 آزمون ${examId}</p>`;
    
    // دریافت سوالات از Worker
    async function loadQuestions() {
        const resp = await fetch(`${WORKER_URL}/api/questions?exam_id=${examId}`);
        if (resp.ok) {
            questions = await resp.json();
            const container = document.getElementById('questions-area');
            container.innerHTML = '<h4>📝 پاسخ سوالات را بنویسید:</h4>';
            for (let i = 0; i < questions.length; i++) {
                const q = questions[i];
                container.innerHTML += `
                    <div class="question-card">
                        <p><strong>${i+1}. ${q.text}</strong></p>
                        ${q.type === 'testi' ? `
                            ${q.options.map((opt, idx) => `
                                <label><input type="radio" name="q_${q.id}" value="${opt}"> ${opt}</label><br>
                            `).join('')}
                        ` : `
                            <textarea id="ans_${q.id}" rows="2" placeholder="پاسخ خود را بنویسید..."></textarea>
                        `}
                    </div>
                `;
            }
        }
    }
    
    async function verifyToken() {
        const resp = await fetch(`${WORKER_URL}/api/verify`, {
            method: "POST",
            body: JSON.stringify({ user_id: userId, token, ts })
        });
        const data = await resp.json();
        if (!data.valid) {
            document.getElementById('status').innerHTML = `❌ ${data.error}`;
            document.getElementById('startBtn').disabled = true;
        }
        return data.valid;
    }
    
    async function getUploadUrl() {
        const resp = await fetch(`${WORKER_URL}/api/get-upload-url`, {
            method: "POST",
            body: JSON.stringify({ user_id: userId, token, ts, exam_id: examId, student_name: studentName })
        });
        const data = await resp.json();
        uploadUrl = data.uploadUrl;
        fileKey = data.fileKey;
        return !!uploadUrl;
    }
    
    function collectAnswers() {
        const answers = {};
        for (const q of questions) {
            if (q.type === 'testi') {
                const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
                if (selected) answers[q.id] = selected.value;
            } else {
                const answer = document.getElementById(`ans_${q.id}`)?.value;
                if (answer) answers[q.id] = answer;
            }
        }
        return answers;
    }
    
    async function startExam() {
        await loadQuestions();
        const valid = await verifyToken();
        if (!valid) return;
        
        const hasUrl = await getUploadUrl();
        if (!hasUrl) return;
        
        await startRecording();
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
    }
    
    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: { width: { ideal: 854 }, height: { ideal: 480 }, frameRate: { ideal: 10 } },
                audio: true
            });
            
            mediaRecorder = new MediaRecorder(stream, { videoBitsPerSecond: 500000 });
            chunks = [];
            mediaRecorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                uploadVideo(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start(1000);
            startTimer();
            document.getElementById('status').innerHTML = '🔴 در حال ضبط...';
            document.getElementById('status').classList.add('recording');
            
        } catch (err) {
            document.getElementById('status').innerHTML = `❌ ${err.message}`;
        }
    }
    
    function startTimer() {
        seconds = 0;
        timerInterval = setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            document.getElementById('timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }, 1000);
    }
    
    function stopRecording() {
        if (mediaRecorder?.state === 'recording') {
            mediaRecorder.stop();
            clearInterval(timerInterval);
            document.getElementById('status').innerHTML = '⏳ در حال ارسال...';
        }
    }
    
    async function uploadVideo(blob) {
        const answers = collectAnswers();
        
        const xhr = new XMLHttpRequest();
        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                const percent = (e.loaded / e.total) * 100;
                document.getElementById('progress-bar').style.width = percent + '%';
            }
        };
        xhr.onload = async () => {
            if (xhr.status === 200) {
                await fetch(`${WORKER_URL}/api/upload-complete`, {
                    method: "POST",
                    body: JSON.stringify({
                        fileKey, user_id: userId, token, ts,
                        exam_id: examId, student_name: studentName,
                        answers: answers, videoSize: blob.size
                    })
                });
                document.getElementById('status').innerHTML = '✅ فیلم ارسال شد! صفحه را ببندید.';
                document.getElementById('stopBtn').style.display = 'none';
            } else {
                document.getElementById('status').innerHTML = '❌ خطا در ارسال';
            }
        };
        xhr.open('PUT', uploadUrl);
        xhr.send(blob);
    }
</script>
</body>
  </html>
