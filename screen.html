<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>ضبط صفحه - آزمون عملی</title>
    <style>
        body{font-family:Tahoma;background:#1a1a2e;color:#fff;padding:20px}
        .container{max-width:800px;margin:auto;background:#16213e;padding:20px;border-radius:15px}
        button{background:#e94560;color:#fff;border:none;padding:12px 24px;margin:10px;border-radius:8px;cursor:pointer}
        button:disabled{background:#555;cursor:not-allowed}
        .workshop-card{background:#0f3460;margin:15px 0;padding:15px;border-radius:10px}
        .question{margin:10px 0;padding:10px;background:#1a1a2e;border-radius:8px}
        textarea{width:100%;padding:8px;border-radius:5px}
        #timer{font-size:48px;margin:20px;color:#e94560;text-align:center}
        .progress-bar{width:0%;height:10px;background:#4CAF50;transition:width 0.3s}
        .floating-webcam{position:fixed;bottom:20px;right:20px;width:200px;height:150px;border-radius:10px;border:2px solid #e94560;z-index:10000;background:#000;cursor:pointer}
        .floating-webcam video{width:100%;height:100%;object-fit:cover}
        .floating-webcam.minimized{width:60px;height:45px}
        .webcam-close{position:absolute;top:-10px;right:-10px;background:#e94560;border-radius:50%;width:24px;height:24px;text-align:center;cursor:pointer}
        .step-box{padding:15px;border-radius:10px;margin:15px 0;text-align:center}
        .success{background:#4CAF50}
        .warning{background:#e94560}
        .info{background:#2196F3}
    </style>
</head>
<body>
<div class="container">
    <h2>🎥 آزمون عملی</h2>
    <div id="info"></div>
    
    <div id="workshopArea"></div>
    
    <div id="recordingArea" style="display:none;">
        <div id="timer">۰۰:۰۰</div>
        <div id="status"></div>
        <div class="progress-bar" id="progress-bar"></div>
        <button id="stopBtn" onclick="stopRecording()">⏹️ پایان ضبط و ارسال</button>
    </div>
    
    <div id="nextBtnArea" style="display:none; text-align:center; margin-top:20px;">
        <button id="nextBtn" onclick="nextWorkshop()">➡️ کارگاه بعدی</button>
    </div>
</div>

<script>
const WORKER_URL = "https://exam-worker.mosk62013.workers.dev"; // آدرس Worker خود را وارد کنید
const params = new URLSearchParams(window.location.search);
const examId = params.get('exam_id');
const userId = params.get('user_id');
const studentName = decodeURIComponent(params.get('name') || 'کاربر');
const token = params.get('token');
const ts = params.get('ts');

let workshops = [];           // لیست کارگاه‌های این دانشجو
let currentIndex = 0;        // کارگاه جاری
let currentWorkshop = null;   // کارگاه فعلی
let mediaRecorder = null;
let recordedChunks = [];
let seconds = 0;
let timerInterval = null;
let screenStream = null;
let micStream = null;
let webcamDiv = null;

document.getElementById('info').innerHTML = `<h3>👤 ${studentName}</h3><p>📚 آزمون ${examId}</p>`;

// ========== دریافت کارگاه‌ها از Worker ==========
async function loadWorkshops() {
    const response = await fetch(`${WORKER_URL}/api/random-workshops`);
    workshops = await response.json();
    console.log("کارگاه‌ها:", workshops);
    showCurrentWorkshop();
}

// ========== نمایش سوالات کارگاه فعلی ==========
function showCurrentWorkshop() {
    if (currentIndex >= workshops.length) {
        finishAllWorkshops();
        return;
    }
    
    currentWorkshop = workshops[currentIndex];
    const questions = JSON.parse(currentWorkshop.questions_json);
    
    let html = `<div class="workshop-card">
        <h2>📚 ${currentWorkshop.title}</h2>
        <p><strong>رنج ${currentWorkshop.range_type}</strong></p>`;
    
    for (let i = 0; i < questions.length; i++) {
        html += `
            <div class="question">
                <p><strong>سوال ${i+1}:</strong> ${questions[i]}</p>
                <textarea id="ans_${i}" rows="3" placeholder="پاسخ خود را بنویسید..."></textarea>
            </div>
        `;
    }
    html += `<button onclick="startRecording()">🎬 شروع ضبط برای این کارگاه</button>
    </div>`;
    
    document.getElementById('workshopArea').innerHTML = html;
    document.getElementById('nextBtnArea').style.display = 'none';
    document.getElementById('recordingArea').style.display = 'none';
}

// ========== دریافت دسترسی وب‌کم و شروع ضبط ==========
async function requestPermissionsAndStart() {
    try {
        // دریافت دسترسی وب کم و میکروفون
        micStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        
        // ایجاد پنجره شناور وب کم
        if (webcamDiv) webcamDiv.remove();
        webcamDiv = document.createElement('div');
        webcamDiv.className = 'floating-webcam';
        const videoElem = document.createElement('video');
        videoElem.srcObject = micStream;
        videoElem.autoplay = true;
        videoElem.muted = true;
        webcamDiv.appendChild(videoElem);
        
        const closeBtn = document.createElement('div');
        closeBtn.innerHTML = '✕';
        closeBtn.className = 'webcam-close';
        closeBtn.onclick = () => {
            if (webcamDiv) webcamDiv.remove();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            micStream = null;
        };
        webcamDiv.appendChild(closeBtn);
        webcamDiv.onclick = () => webcamDiv.classList.toggle('minimized');
        document.body.appendChild(webcamDiv);
        
        // شروع ضبط صفحه
        startRecording();
        
    } catch(err) {
        alert('خطا در دسترسی به وب کم: ' + err.message);
    }
}

async function startRecording() {
    try {
        document.getElementById('status').innerHTML = '<div class="info">⏳ درخواست دسترسی به صفحه...</div>';
        
        screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: { width: 854, height: 480, frameRate: 15 },
            audio: true
        });
        
        // ترکیب ویدیوی صفحه + صدای میکروفون
        const tracks = [...screenStream.getVideoTracks()];
        if (micStream && micStream.getAudioTracks().length > 0) {
            tracks.push(...micStream.getAudioTracks());
        }
        tracks.push(...screenStream.getAudioTracks());
        const combinedStream = new MediaStream(tracks);
        
        mediaRecorder = new MediaRecorder(combinedStream, { videoBitsPerSecond: 500000 });
        recordedChunks = [];
        
        mediaRecorder.ondataavailable = (e) => { if(e.data.size) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            uploadVideo(blob);
            if (screenStream) screenStream.getTracks().forEach(t => t.stop());
        };
        
        mediaRecorder.start(1000);
        startTimer();
        
        document.getElementById('workshopArea').style.display = 'none';
        document.getElementById('recordingArea').style.display = 'block';
        document.getElementById('status').innerHTML = '<div class="success">🔴 در حال ضبط...</div>';
        
        setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
        }, 300000);
        
        if (screenStream.getVideoTracks()[0]) {
            screenStream.getVideoTracks()[0].onended = () => {
                if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
            };
        }
        
    } catch(err) {
        document.getElementById('status').innerHTML = '<div class="warning">❌ خطا: ' + err.message + '</div>';
    }
}

function startTimer() {
    seconds = 0;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        seconds++;
        let mins = Math.floor(seconds/60);
        let secs = seconds%60;
        document.getElementById('timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }, 1000);
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        clearInterval(timerInterval);
        document.getElementById('status').innerHTML = '<div class="info">⏳ در حال ارسال...</div>';
    }
}

// ========== آپلود ویدیو با سوالات ==========
async function uploadVideo(blob) {
    // جمع‌آوری پاسخ‌های سوالات این کارگاه
    const questions = JSON.parse(currentWorkshop.questions_json);
    const answers = {};
    for (let i = 0; i < questions.length; i++) {
        const ans = document.getElementById(`ans_${i}`)?.value || '';
        answers[`q${i+1}`] = ans;
    }
    
    const formData = new FormData();
    formData.append('video', blob);
    formData.append('exam_id', examId);
    formData.append('user_id', userId);
    formData.append('student_name', studentName);
    formData.append('token', token);
    formData.append('ts', ts);
    formData.append('workshop_id', currentWorkshop.id);
    formData.append('workshop_title', currentWorkshop.title);
    formData.append('answers', JSON.stringify(answers));
    
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e) => {
        if(e.lengthComputable) {
            document.getElementById('progress-bar').style.width = (e.loaded/e.total)*100 + '%';
        }
    };
    xhr.onload = () => {
        if(xhr.status === 200) {
            document.getElementById('status').innerHTML = '<div class="success">✅ ارسال شد!</div>';
            // رفتن به کارگاه بعدی
            currentIndex++;
            // بستن پنجره وب کم برای کارگاه بعدی (دوباره درخواست می‌شود)
            if (webcamDiv) webcamDiv.remove();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            micStream = null;
            
            document.getElementById('workshopArea').style.display = 'block';
            document.getElementById('recordingArea').style.display = 'none';
            document.getElementById('nextBtnArea').style.display = 'block';
        } else {
            document.getElementById('status').innerHTML = '<div class="warning">❌ خطا در ارسال</div>';
        }
    };
    xhr.onerror = () => document.getElementById('status').innerHTML = '<div class="warning">❌ خطای شبکه</div>';
    xhr.open('POST', WORKER_URL + '/upload');
    xhr.send(formData);
}

function nextWorkshop() {
    document.getElementById('nextBtnArea').style.display = 'none';
    showCurrentWorkshop();
}

function finishAllWorkshops() {
    document.getElementById('workshopArea').innerHTML = '<div class="success">✅ تمام کارگاه‌ها با موفقیت ارسال شد! از همراهی شما متشکریم.</div>';
}

// شروع
loadWorkshops();
</script>
</body>
</html>
