<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>ضبط صفحه - آزمون عملی</title>
    <style>
        body {
            font-family: Tahoma;
            background: #1a1a2e;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .step1 { background: #2196F3; }
        .step2 { background: #4CAF50; }
        .stop { background: #e94560; }
        #timer {
            font-size: 48px;
            text-align: center;
            margin: 20px;
            font-weight: bold;
            color: #e94560;
        }
        .progress {
            width: 0%;
            height: 10px;
            background: #4CAF50;
            transition: width 0.3s;
            border-radius: 5px;
        }
        .info {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .success { background: #4CAF50; }
        .warning { background: #e94560; }
        .blue { background: #2196F3; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎥 آزمون عملی</h2>
    <div id="info"></div>
    
    <div id="step1Div" class="info blue">
        📌 مرحله 1: روی دکمه "درخواست دسترسی" کلیک کنید
    </div>
    
    <div id="step2Div" style="display:none;" class="info success">
        ✅ مرحله 2: روی دکمه "شروع ضبط" کلیک کنید
    </div>
    
    <div id="timer" style="display:none;">۰۰:۰۰</div>
    <div id="status" class="info"></div>
    <div class="progress" id="progressBar"></div>
    
    <div style="text-align:center;">
        <button id="permBtn" class="step1">🎤 درخواست دسترسی به میکروفون و وبکم</button>
        <button id="startBtn" style="display:none;" class="step2">🎬 شروع ضبط صفحه</button>
        <button id="stopBtn" style="display:none;" class="stop">⏹️ پایان و ارسال</button>
    </div>
</div>

<script>
// ===== تنظیمات =====
const WORKER_URL = "https://exam-worker.mosk62013.workers.dev";  // آدرس Worker خود را اینجا وارد کنید

const params = new URLSearchParams(window.location.search);
const examId = params.get('exam_id');
const userId = params.get('user_id');
const studentName = decodeURIComponent(params.get('name') || 'کاربر');
const token = params.get('token');
const ts = params.get('ts');

document.getElementById('info').innerHTML = `<h3>👤 ${studentName}</h3><p>📚 آزمون ${examId}</p>`;

// ===== متغیرها =====
let mediaRecorder = null;
let chunks = [];
let seconds = 0;
let timerInterval = null;
let screenStream = null;
let micStream = null;
let webcamElement = null;

// ===== مرحله 1: گرفتن دسترسی میکروفون و وبکم =====
document.getElementById('permBtn').onclick = async function() {
    try {
        document.getElementById('status').innerHTML = '<div class="info blue">⏳ درخواست دسترسی...</div>';
        
        // گرفتن دسترسی به وبکم و میکروفون
        micStream = await navigator.mediaDevices.getUserMedia({ 
            video: true, 
            audio: true 
        });
        
        // نمایش وبکم شناور در گوشه صفحه
        webcamElement = document.createElement('video');
        webcamElement.srcObject = micStream;
        webcamElement.autoplay = true;
        webcamElement.muted = true;
        webcamElement.style.position = 'fixed';
        webcamElement.style.bottom = '20px';
        webcamElement.style.right = '20px';
        webcamElement.style.width = '160px';
        webcamElement.style.height = '120px';
        webcamElement.style.borderRadius = '10px';
        webcamElement.style.border = '3px solid #e94560';
        webcamElement.style.zIndex = '9999';
        document.body.appendChild(webcamElement);
        
        document.getElementById('step1Div').style.display = 'none';
        document.getElementById('step2Div').style.display = 'block';
        document.getElementById('status').innerHTML = '<div class="info success">✅ دسترسی داده شد!</div>';
        document.getElementById('permBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'inline-block';
        
    } catch(err) {
        document.getElementById('status').innerHTML = `<div class="info warning">❌ خطا: ${err.message}</div>`;
    }
};

// ===== مرحله 2: شروع ضبط صفحه =====
document.getElementById('startBtn').onclick = async function() {
    try {
        document.getElementById('status').innerHTML = '<div class="info blue">⏳ انتخاب صفحه...</div>';
        
        // گرفتن صفحه با صدا
        screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: { width: 854, height: 480, frameRate: 15 },
            audio: true
        });
        
        // ترکیب ویدیوی صفحه و صدای میکروفون
        const tracks = [...screenStream.getVideoTracks()];
        if (micStream) {
            tracks.push(...micStream.getAudioTracks());
        }
        tracks.push(...screenStream.getAudioTracks());
        const finalStream = new MediaStream(tracks);
        
        mediaRecorder = new MediaRecorder(finalStream, { videoBitsPerSecond: 500000 });
        chunks = [];
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) chunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            if (blob.size > 20 * 1024 * 1024) {
                document.getElementById('status').innerHTML = '<div class="info warning">❌ حجم فیلم بیشتر از 20 مگابایت است</div>';
                return;
            }
            uploadVideo(blob);
            if (screenStream) screenStream.getTracks().forEach(t => t.stop());
        };
        
        mediaRecorder.start(1000);
        
        // تایمر
        seconds = 0;
        document.getElementById('timer').style.display = 'block';
        timerInterval = setInterval(() => {
            seconds++;
            let mins = Math.floor(seconds / 60);
            let secs = seconds % 60;
            document.getElementById('timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (seconds >= 300) {
                clearInterval(timerInterval);
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }
        }, 1000);
        
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        document.getElementById('status').innerHTML = '<div class="info success">🔴 در حال ضبط... (حداکثر ۵ دقیقه)</div>';
        
    } catch(err) {
        document.getElementById('status').innerHTML = `<div class="info warning">❌ خطا: ${err.message}</div>`;
    }
};

// ===== پایان ضبط =====
document.getElementById('stopBtn').onclick = function() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        clearInterval(timerInterval);
        document.getElementById('status').innerHTML = '<div class="info blue">⏳ در حال ارسال...</div>';
    }
};

// ===== آپلود ویدیو =====
async function uploadVideo(blob) {
    const formData = new FormData();
    formData.append('video', blob);
    formData.append('exam_id', examId);
    formData.append('user_id', userId);
    formData.append('student_name', studentName);
    formData.append('token', token);
    formData.append('ts', ts);
    formData.append('answers', JSON.stringify({}));
    
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
        }
    };
    xhr.onload = () => {
        if (xhr.status === 200) {
            document.getElementById('status').innerHTML = '<div class="info success">✅ فیلم ارسال شد! صفحه را ببندید.</div>';
            document.getElementById('stopBtn').style.display = 'none';
            // بستن وبکم
            if (webcamElement) webcamElement.remove();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
        } else {
            document.getElementById('status').innerHTML = '<div class="info warning">❌ خطا در ارسال</div>';
        }
    };
    xhr.onerror = () => {
        document.getElementById('status').innerHTML = '<div class="info warning">❌ خطای شبکه</div>';
    };
    xhr.open('POST', WORKER_URL + '/upload');
    xhr.send(formData);
}
</script>
</body>
</html>
